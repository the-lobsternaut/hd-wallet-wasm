name: Publish to NPM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not publish)"
        required: false
        default: "false"
        type: boolean

# Required for NPM provenance / trusted publishing
permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.51"
          actions-cache-folder: "emsdk-cache"

      - name: Verify Emscripten
        run: emcc --version

      - name: Cache Crypto++ (WASM)
        uses: actions/cache@v4
        with:
          path: build/_deps/cryptopp*
          key: cryptopp-wasm-${{ runner.os }}-8.9.0-emsdk-3.1.51

      - name: Configure CMake with Emscripten
        run: emcmake cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DHD_WALLET_BUILD_WASM=ON

      - name: Build WASM targets
        run: cmake --build build --parallel $(nproc) --target hd_wallet_wasm_npm

      - name: Verify build output
        run: |
          echo "Checking WASM output files..."
          ls -la wasm/dist/
          test -f wasm/dist/hd-wallet.js
          test -f wasm/dist/hd-wallet.wasm

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: |
            wasm/dist/
            wasm/src/
            wasm/package.json
            wasm/README.md
          retention-days: 1

  test:
    name: Test Package
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: wasm/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --ignore-scripts
        working-directory: wasm

      - name: Run tests
        run: npm test
        working-directory: wasm
        continue-on-error: true  # Tests may not exist yet

      - name: Verify package
        run: npm pack --dry-run
        working-directory: wasm

  publish:
    name: Publish to NPM
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: wasm/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Update package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd wasm
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Create README for npm
        run: |
          if [ ! -f wasm/README.md ]; then
            cp README.md wasm/README.md
          fi

      - name: Publish to NPM (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: npm publish --dry-run --access public
        working-directory: wasm

      - name: Publish to NPM with provenance
        if: github.event.inputs.dry_run != 'true'
        run: npm publish --access public --provenance
        working-directory: wasm

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            wasm/dist/hd-wallet.js
            wasm/dist/hd-wallet.wasm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
