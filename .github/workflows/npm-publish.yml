name: Publish to NPM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not publish)"
        required: false
        default: false
        type: boolean

# Required for NPM provenance / trusted publishing
permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.51"
          actions-cache-folder: "emsdk-cache"

      - name: Verify Emscripten
        run: emcc --version

      - name: Cache OpenSSL FIPS build
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: openssl-fips/dist
          key: openssl-fips-wasm-${{ runner.os }}-3.0.9-emsdk-3.1.51

      - name: Build OpenSSL FIPS
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          cd openssl-fips
          chmod +x build.sh
          ./build.sh

      - name: Verify OpenSSL FIPS
        run: |
          echo "Checking OpenSSL FIPS build..."
          ls -la openssl-fips/dist/lib/ || echo "OpenSSL dist not found"
          test -f openssl-fips/dist/lib/libcrypto.a && echo "✓ libcrypto.a found" || echo "✗ libcrypto.a missing"

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build/_deps/cryptopp*
          key: cryptopp-wasm-${{ runner.os }}-8.9.0-emsdk-3.1.51

      - name: Configure CMake with Emscripten
        run: emcmake cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DHD_WALLET_BUILD_WASM=ON -DHD_WALLET_USE_OPENSSL=ON

      - name: Build WASM targets
        run: cmake --build build --parallel $(nproc) --target hd_wallet_wasm_npm

      - name: Verify build output
        run: |
          echo "Checking WASM output files..."
          ls -la wasm/dist/
          test -f wasm/dist/hd-wallet.js
          test -f wasm/dist/hd-wallet.wasm

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: |
            wasm/dist/
            wasm/src/
            wasm/package.json
            wasm/README.md
          retention-days: 1

  test:
    name: Test Package
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: wasm/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --ignore-scripts
        working-directory: wasm

      - name: Run tests
        run: npm test
        working-directory: wasm

      - name: Verify package
        run: npm pack --dry-run
        working-directory: wasm

  publish-wasm:
    name: Publish hd-wallet-wasm
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: wasm/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Update package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd wasm
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Create README for npm
        run: |
          if [ ! -f wasm/README.md ]; then
            cp README.md wasm/README.md
          fi

      - name: Publish to NPM (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: npm publish --dry-run --access public --provenance
        working-directory: wasm

      - name: Publish to NPM with provenance
        if: github.event.inputs.dry_run != 'true'
        run: npm publish --access public --provenance
        working-directory: wasm

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            wasm/dist/hd-wallet.js
            wasm/dist/hd-wallet.wasm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-ui:
    name: Publish hd-wallet-ui
    needs: [publish-wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version and dependency
        run: |
          cd wallet-ui
          # Set version from tag (or keep current for workflow_dispatch)
          if [ -n "${{ steps.version.outputs.version }}" ]; then
            npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version
            WASM_VERSION="${{ steps.version.outputs.version }}"
          else
            WASM_VERSION="$(node -p "require('../wasm/package.json').version")"
          fi
          # Replace file: dependency with published version
          node -e "
            const pkg = require('./package.json');
            pkg.dependencies['hd-wallet-wasm'] = '^${WASM_VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Updated hd-wallet-wasm dependency to ^${WASM_VERSION}"
          cat package.json | head -40

      - name: Install dependencies
        run: npm install --ignore-scripts
        working-directory: wallet-ui

      - name: Verify package
        run: npm pack --dry-run
        working-directory: wallet-ui

      - name: Publish to NPM (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: npm publish --dry-run --access public --provenance --tag latest
        working-directory: wallet-ui

      - name: Publish to NPM with provenance
        if: github.event.inputs.dry_run != 'true'
        run: npm publish --access public --provenance --tag latest
        working-directory: wallet-ui
